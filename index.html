<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conciliación IVA — IPSP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8ecf4;
    --text2: #8891a8;
    --ok: #4fffb0;
    --warn: #ffd166;
    --err: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo-badge {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #0d0f14;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.3px;
  }

  header span {
    color: var(--text2);
    font-size: 13px;
    margin-left: 4px;
  }

  .main {
    padding: 32px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Upload zone */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .drop-zone {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,255,176,0.04);
  }

  .drop-zone.loaded {
    border-style: solid;
    border-color: var(--accent);
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .dz-icon {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .dz-label {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 5px;
  }

  .dz-sub {
    color: var(--text2);
    font-size: 12px;
  }

  .dz-files {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .file-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.3);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--accent);
  }

  /* Run button */
  .run-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .btn-run {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-run:hover { background: #38e89a; transform: translateY(-1px); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status-msg {
    color: var(--text2);
    font-size: 13px;
  }

  /* Month tabs */
  .month-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
    font-weight: 500;
  }

  .tab .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
  }

  .tab.has-diff .dot { background: var(--err); }
  .tab.no-diff .dot { background: var(--ok); }
  .tab.no-data .dot { background: var(--text2); }

  /* Results panel */
  .results-section {
    display: none;
  }
  .results-section.visible { display: block; }

  .month-panel {
    display: none;
  }
  .month-panel.active { display: block; }

  /* Summary cards */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .card-label {
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }

  .card-value.ok { color: var(--ok); }
  .card-value.warn { color: var(--warn); }
  .card-value.err { color: var(--err); }
  .card-value.neutral { color: var(--text); }

  .card-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .table-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  .badge {
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge.err { background: rgba(255,107,107,0.15); color: var(--err); border: 1px solid rgba(255,107,107,0.3); }
  .badge.ok { background: rgba(79,255,176,0.12); color: var(--ok); border: 1px solid rgba(79,255,176,0.3); }
  .badge.warn { background: rgba(255,209,102,0.12); color: var(--warn); border: 1px solid rgba(255,209,102,0.3); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: var(--surface2);
    padding: 10px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text2);
    text-align: left;
    font-weight: 400;
  }

  th.right, td.right { text-align: right; }

  td {
    padding: 11px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .diff-cell {
    font-weight: 600;
  }

  .diff-cell.ok { color: var(--ok); }
  .diff-cell.err { color: var(--err); }
  .diff-cell.warn { color: var(--warn); }

  .concept-code {
    color: var(--text2);
    font-size: 11px;
    display: block;
  }

  .concept-name {
    font-size: 13px;
  }

  /* Seniat section details */
  .seniat-block {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    border-left: 3px solid var(--accent);
  }

  .seniat-block h4 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .seniat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .seniat-item label {
    display: block;
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .seniat-item value {
    display: block;
    font-size: 14px;
    font-weight: 500;
  }

  /* Empty / no-pdf state */
  .no-pdf-notice {
    background: rgba(255,209,102,0.08);
    border: 1px solid rgba(255,209,102,0.25);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Progress */
  .progress-bar-outer {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    width: 200px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s;
  }

  /* export btn */
  .btn-export {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .sep {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .loading-spin {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(79,255,176,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scroll-table { overflow-x: auto; }

  @media (max-width: 900px) {
    .upload-grid { grid-template-columns: 1fr; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
    .seniat-grid { grid-template-columns: 1fr 1fr; }
    .main { padding: 20px; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">IV</div>
  <div>
    <h1>Conciliación IVA<span>— IPSPP</span></h1>
    <div style="font-size:12px;color:var(--text2);margin-top:2px;">Balance de comprobación vs Declaraciones SENIAT</div>
  </div>
</header>

<div class="main">

  <!-- Upload -->
  <div class="upload-grid">
    <div class="drop-zone" id="dzExcel">
      <input type="file" accept=".xlsx,.xls" id="fileExcel" multiple>
      <div class="dz-icon">📊</div>
      <div class="dz-label">Balance de Comprobación</div>
      <div class="dz-sub">Archivo .xlsx con 12 hojas (Enero–Diciembre)</div>
      <div class="dz-files" id="excelFiles"></div>
    </div>
    <div class="drop-zone" id="dzPdf">
      <input type="file" accept=".pdf" id="filePdf" multiple>
      <div class="dz-icon">📄</div>
      <div class="dz-label">Declaraciones SENIAT</div>
      <div class="dz-sub">Uno o más PDFs — se detecta el mes automáticamente</div>
      <div class="dz-files" id="pdfFiles"></div>
    </div>
  </div>

  <div class="run-bar">
    <button class="btn-run" id="btnRun" disabled>
      <span>▶</span> Ejecutar Conciliación
    </button>
    <div id="statusMsg" class="status-msg">Carga los archivos para comenzar</div>
    <div class="progress-bar-outer" id="progressOuter" style="display:none">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">

    <div class="month-tabs" id="monthTabs"></div>

    <div id="monthPanels"></div>

  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── State ────────────────────────────────────────────────────────────────────
let excelFile = null;
let pdfFiles = [];
let allResults = {}; // keyed by month number 1-12

const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const SHEET_MONTH_MAP = {
  'Hoja1':1,'Hoja2':2,'Hoja3':3,'Hoja4':4,'Hoja5':5,'Hoja6':6,
  'Hoja7':7,'Hoja8':8,'Hoja9':9,'Hoja10':10,'Hoja11':11,'Hoja12':12
};

// Account codes in the balance that map to SENIAT fields
// REGLA GENERAL:
//   Cuentas de PASIVO (2xxxxxx): naturaleza acreedora → el HABER (Créditos) registra el cargo/causación
//   Cuentas de ACTIVO (1xxxxxx): naturaleza deudora   → el DEBE  (Débitos)  registra el incremento
//   Cuentas de INGRESO (4xxxxxx): naturaleza acreedora → el HABER (Créditos) registra el ingreso
const ACCOUNT_MAP = [];

// ─── File Inputs ──────────────────────────────────────────────────────────────
document.getElementById('fileExcel').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  excelFile = f;
  document.getElementById('excelFiles').innerHTML = `<div class="file-pill">✓ ${f.name}</div>`;
  document.getElementById('dzExcel').classList.add('loaded');
  checkReady();
});

document.getElementById('filePdf').addEventListener('change', (e) => {
  pdfFiles = Array.from(e.target.files);
  const container = document.getElementById('pdfFiles');
  container.innerHTML = pdfFiles.map(f => `<div class="file-pill">✓ ${f.name}</div>`).join('');
  document.getElementById('dzPdf').classList.add('loaded');
  checkReady();
});

['dzExcel','dzPdf'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    const inp = el.querySelector('input[type=file]');
    const dt = e.dataTransfer;
    // Trigger change manually
    Object.defineProperty(inp, 'files', { value: dt.files, writable: true });
    inp.dispatchEvent(new Event('change'));
  });
});

function checkReady() {
  document.getElementById('btnRun').disabled = !(excelFile);
  if (!excelFile) {
    setStatus('Carga el Balance de Comprobación para comenzar');
  } else if (pdfFiles.length === 0) {
    setStatus('Balance cargado ✓ — También puedes cargar los PDFs del SENIAT');
    document.getElementById('btnRun').disabled = false;
  } else {
    setStatus(`Balance + ${pdfFiles.length} declaración(es) SENIAT listos`);
  }
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

// ─── Main Run ─────────────────────────────────────────────────────────────────
document.getElementById('btnRun').addEventListener('click', async () => {
  document.getElementById('btnRun').disabled = true;
  setStatus('Procesando...');
  document.getElementById('progressOuter').style.display = 'block';
  setProgress(0);

  try {
    // 1. Parse Excel
    setStatus('Leyendo Balance de Comprobación...');
    const balanceData = await parseExcel(excelFile);
    setProgress(30);

    // 2. Parse PDFs
    const seniatData = {};
    if (pdfFiles.length > 0) {
      setStatus(`Extrayendo datos de ${pdfFiles.length} declaración(es)...`);
      for (let i = 0; i < pdfFiles.length; i++) {
        const data = await parseSeniatPdf(pdfFiles[i]);
        if (data && data.month) {
          seniatData[data.month] = data;
        }
        setProgress(30 + ((i+1)/pdfFiles.length)*40);
      }
    }
    setProgress(70);

    // 3. Reconcile
    setStatus('Calculando conciliación...');
    allResults = {};
    for (let m = 1; m <= 12; m++) {
      if (balanceData[m]) {
        allResults[m] = reconcile(m, balanceData[m], seniatData[m] || null);
      }
    }
    setProgress(95);

    // 4. Render
    renderResults();
    setProgress(100);
    setStatus(`Conciliación completada — ${Object.keys(allResults).length} meses procesados`);
    document.getElementById('progressOuter').style.display = 'none';
    document.getElementById('resultsSection').classList.add('visible');
    document.getElementById('btnRun').disabled = false;

  } catch(err) {
    setStatus('Error: ' + err.message);
    console.error(err);
    document.getElementById('btnRun').disabled = false;
    document.getElementById('progressOuter').style.display = 'none';
  }
});

function setProgress(p) {
  document.getElementById('progressBar').style.width = p + '%';
}

// ─── Excel Parser ─────────────────────────────────────────────────────────────
async function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const result = {};

        wb.SheetNames.forEach(sheetName => {
          const monthNum = SHEET_MONTH_MAP[sheetName];
          if (!monthNum) return;

          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

          // Parse accounts: col0=account/name, col1=saldo_anterior, col2=debitos, col3=creditos, col4=saldo_actual
          const accounts = {};
          rows.forEach(row => {
            if (!row || !row[0]) return;
            const cell0 = String(row[0]).trim();
            // Account codes are 7-digit numbers
            const codeMatch = cell0.match(/^(\d{7})\s+/);
            if (codeMatch) {
              const code = codeMatch[1];
              accounts[code] = {
                code,
                name: cell0.replace(code, '').trim(),
                saldo_anterior: parseNum(row[1]),
                debitos: parseNum(row[2]),
                creditos: parseNum(row[3]),
                saldo_actual: parseNum(row[4]),
                movimiento: parseNum(row[5])
              };
            }
          });

          result[monthNum] = accounts;
        });

        resolve(result);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function parseNum(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return val;
  const s = String(val).replace(/[^\d.,-]/g,'').replace(',','.');
  return parseFloat(s) || 0;
}

// ─── PDF Parser ───────────────────────────────────────────────────────────────
async function parseSeniatPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(it => it.str).join(' ') + '\n';
  }

  // Extract period (MES/AÑO)
  const periodMatch = fullText.match(/MES\s+A[ÑN]O\s+(\d{2})\s+(\d{4})/);
  if (!periodMatch) {
    // Try alternate pattern
    const alt = fullText.match(/(\d{2})\s+2024/);
    if (!alt) return null;
  }

  const month = periodMatch ? parseInt(periodMatch[1]) : null;
  if (!month || month < 1 || month > 12) return null;

  const data = { month, rawText: fullText };

  // Helper: extract value after item number pattern
  function extractItem(itemNum) {
    // Pattern: item number followed by value
    const patterns = [
      new RegExp(`\\b${itemNum}\\b\\s+([\\d.,]+)`),
      new RegExp(`\\|\\s*${itemNum}\\s*\\|\\s*([\\d.,]+)`)
    ];
    for (const p of patterns) {
      const m = fullText.match(p);
      if (m) return parseVenFloat(m[1]);
    }
    return 0;
  }

  function parseVenFloat(s) {
    if (!s) return 0;
    // Venezuelan format: 1.234,56 or 1234.56
    s = s.trim();
    if (s.includes(',') && s.includes('.')) {
      // 1.234,56 → remove dots, replace comma
      if (s.lastIndexOf(',') > s.lastIndexOf('.')) {
        return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
      }
    }
    return parseFloat(s.replace(',','.')) || 0;
  }

  // Extract all numbers from text in sequence - more robust approach
  // We'll find key labels and their following numbers
  function extractAfterLabel(label, text) {
    const idx = text.indexOf(label);
    if (idx < 0) return 0;
    const sub = text.substring(idx + label.length, idx + label.length + 80);
    const m = sub.match(/[\d]{1,3}(?:[.,]\d{3})*(?:[.,]\d{1,2})?/);
    if (!m) return 0;
    return parseVenFloat(m[0]);
  }

  // Key SENIAT fields
  data.ventas_no_gravadas = extractAfterLabel('Ventas Internas no Gravadas', fullText);
  data.ventas_exportacion = extractAfterLabel('Ventas de Exportaci', fullText);
  data.ventas_internas_gravadas_base = extractAfterLabel('Ventas Internas Gravadas por Al', fullText);
  data.total_ventas_base = extractAfterLabel('Total Ventas y D', fullText);
  data.total_debitos_fiscales = extractAfterLabel('Total D\u00e9bitos Fiscales', fullText);
  
  data.compras_no_gravadas = extractAfterLabel('Compras no Gravadas', fullText);
  data.compras_internas_gravadas_base = extractAfterLabel('Compras Internas Gravadas por Al\u00edcuota General', fullText);
  data.total_compras_base = extractAfterLabel('Total Compras y Cr\u00e9ditos Fiscales del Per', fullText);
  data.total_creditos_fiscales_deducibles = extractAfterLabel('Total cr\u00e9ditos fiscales deducibles', fullText);

  data.excedente_credito_anterior = extractAfterLabel('Excedente Cr\u00e9ditos Fiscales del mes Anterior', fullText);
  data.ajustes_creditos = extractAfterLabel('Ajustes a los Cr\u00e9ditos Fiscales', fullText);
  data.total_creditos_fiscales = extractAfterLabel('Total Cr\u00e9ditos Fiscales', fullText);

  data.cuota_tributaria = extractAfterLabel('Total Cuota Tributaria del Per', fullText);
  data.excedente_credito_siguiente = extractAfterLabel('Excedente de Cr\u00e9dito Fiscal para el mes siguiente', fullText);
  data.retenciones_periodo = extractAfterLabel('Retenciones del Per', fullText);
  data.total_retenciones = extractAfterLabel('Total Retenciones', fullText);
  data.saldo_retenciones = extractAfterLabel('Saldo de Retenciones de IVA no aplicado', fullText);
  data.total_pagar = extractAfterLabel('Total a Pagar', fullText);

  // Debito fiscal line (item 43)
  data.debito_fiscal_item43 = extractAfterLabel('11.805', fullText) || 0; // fallback

  // Better extraction using numbered items from the text
  // Parse all "item NN value" pairs
  const itemPattern = /\b(\d{2,3})\b\s+([\d]{1,3}(?:[.,]\d{3})*(?:[.,]\d{1,2})?)\b/g;
  const items = {};
  let match;
  while ((match = itemPattern.exec(fullText)) !== null) {
    const itemN = parseInt(match[1]);
    if (itemN >= 20 && itemN <= 90) {
      items[itemN] = parseVenFloat(match[2]);
    }
  }
  data.items = items;

  // Override with item-based if better
  if (items[49] > 0) data.total_debitos_fiscales = items[49];
  if (items[71] > 0) data.total_creditos_fiscales_deducibles = items[71];
  if (items[60] > 0) data.excedente_credito_siguiente = items[60];
  if (items[66] > 0) data.retenciones_periodo = items[66];
  if (items[42] > 0) data.ventas_internas_gravadas_base = items[42];
  if (items[40] > 0) data.ventas_no_gravadas = items[40];
  if (items[33] > 0) data.compras_internas_gravadas_base = items[33];
  if (items[43] > 0) data.debito_fiscal_calculado = items[43];

  return data;
}

// ─── Reconciliation ───────────────────────────────────────────────────────────
function reconcile(monthNum, accounts, seniat) {
  const rows = [];

  function getAccount(code) {
    return accounts[code] || { code, name:'N/A', saldo_anterior:0, debitos:0, creditos:0, saldo_actual:0 };
  }

  // ── 1. DÉBITO FISCAL CAUSADO EN EL PERÍODO ───────────────────────────────
  // Cta. 2121001 es PASIVO (naturaleza acreedora).
  // El HABER (Créditos) del período registra la causación del débito fiscal
  // (facturación × alícuota → obligación con el Fisco).
  // Ese valor debe coincidir con el Ítem 43 (débito fiscal calculado) del SENIAT.
  const deb2121 = getAccount('2121001');
  const balDebitoCausado = Math.abs(deb2121.creditos);
  const senDebitoItem43 = seniat ? (seniat.debito_fiscal_calculado || seniat.total_debitos_fiscales) : null;
  rows.push({
    id: 'debito_causado',
    concepto: 'Débito Fiscal Causado (Haber del período)',
    codigosBalance: '2121001',
    campoBalance: 'Haber (Créditos del período)',
    valorBalance: balDebitoCausado,
    campoSeniat: 'Ítem 43 / 49 — Débito Fiscal del Período',
    valorSeniat: senDebitoItem43,
    diferencia: senDebitoItem43 !== null ? balDebitoCausado - senDebitoItem43 : null,
    nota: 'Pasivo: el HABER registra el IVA cobrado en ventas (causación). Debe = Ventas gravadas × 16%.'
  });

  // ── 2. DÉBITO FISCAL — TOTAL ACUMULADO EN LIBROS (Saldo actual) ──────────
  // El saldo actual de 2121001 refleja lo que queda pendiente de pagar al Fisco
  // después de compensar retenciones/excedentes. Referencia adicional.
  const balDebitoSaldo = Math.abs(deb2121.saldo_actual);
  const senDebitoTotal = seniat ? seniat.total_debitos_fiscales : null;
  rows.push({
    id: 'debito_saldo',
    concepto: 'Débito Fiscal — Saldo Actual en Libros',
    codigosBalance: '2121001',
    campoBalance: 'Saldo Actual',
    valorBalance: balDebitoSaldo,
    campoSeniat: 'Ítem 49 — Total Débitos Fiscales',
    valorSeniat: senDebitoTotal,
    diferencia: senDebitoTotal !== null ? balDebitoSaldo - senDebitoTotal : null,
    nota: 'Saldo acumulado del pasivo de débito fiscal. Refleja obligación neta pendiente al cierre del período.'
  });

  // ── 3. CRÉDITO FISCAL DEL PERÍODO (deducible de compras) ─────────────────
  // Cta. 1151001 es ACTIVO (naturaleza deudora).
  // El HABER (Créditos) registra el uso/aplicación del crédito fiscal acumulado.
  // Ese monto debe coincidir con el crédito total deducido según SENIAT (Ítem 39/71).
  const cred1151 = getAccount('1151001');
  const balCreditoUsado = Math.abs(cred1151.creditos);
  const senCreditoTotal = seniat ? seniat.total_creditos_fiscales : null;
  rows.push({
    id: 'credito_usado',
    concepto: 'Crédito Fiscal Aplicado (Haber del período)',
    codigosBalance: '1151001',
    campoBalance: 'Haber (Créditos del período)',
    valorBalance: balCreditoUsado,
    campoSeniat: 'Ítem 39 — Total Créditos Fiscales',
    valorSeniat: senCreditoTotal,
    diferencia: senCreditoTotal !== null ? balCreditoUsado - senCreditoTotal : null,
    nota: 'Activo: el HABER registra el CF utilizado/compensado en el período. Ítem 39 = suma de todos los créditos aplicados.'
  });

  // También: el DEBE (Débitos) de 1151001 = crédito fiscal generado por compras gravadas del período
  const balCreditoGenerado = Math.abs(cred1151.debitos);
  const senCreditoDeducible = seniat ? seniat.total_creditos_fiscales_deducibles : null;
  rows.push({
    id: 'credito_generado',
    concepto: 'Crédito Fiscal Generado (Debe del período)',
    codigosBalance: '1151001',
    campoBalance: 'Debe (Débitos del período)',
    valorBalance: balCreditoGenerado,
    campoSeniat: 'Ítem 71 — Total Créditos Fiscales Deducibles',
    valorSeniat: senCreditoDeducible,
    diferencia: senCreditoDeducible !== null ? balCreditoGenerado - senCreditoDeducible : null,
    nota: 'Activo: el DEBE registra el IVA soportado en compras del período. Incluye crédito nuevo + excedente anterior aplicado.'
  });

  // ── 4. EXCEDENTE CRÉDITO FISCAL (para el mes siguiente) ──────────────────
  // Cta. 1151002 es ACTIVO.
  // El movimiento neto del período (Debe − Haber) = variación del excedente.
  // El saldo al cierre debe coincidir con el Ítem 60 del SENIAT.
  const exc1151 = getAccount('1151002');
  // Movimiento neto: Debe (entrada excedente nuevo) − Haber (excedente aplicado al mes anterior)
  const balExcMovimiento = Math.abs(exc1151.debitos - exc1151.creditos);  // neto período
  const balExcSaldo = Math.abs(exc1151.saldo_actual);
  const senExc = seniat ? seniat.excedente_credito_siguiente : null;
  rows.push({
    id: 'excedente_cf',
    concepto: 'Excedente Crédito Fiscal (saldo al cierre)',
    codigosBalance: '1151002',
    campoBalance: 'Saldo Actual',
    valorBalance: balExcSaldo,
    campoSeniat: 'Ítem 60 — Excedente CF para mes siguiente',
    valorSeniat: senExc,
    diferencia: senExc !== null ? balExcSaldo - senExc : null,
    nota: 'El saldo actual de 1151002 debe coincidir con el excedente que pasa al período siguiente (Ítem 60).'
  });
  rows.push({
    id: 'excedente_cf_mov',
    concepto: 'Excedente CF — Movimiento neto del período',
    codigosBalance: '1151002',
    campoBalance: 'Debe − Haber del período',
    valorBalance: balExcMovimiento,
    campoSeniat: 'Ítem 60 — Excedente CF (variación)',
    valorSeniat: senExc,
    diferencia: senExc !== null ? balExcMovimiento - senExc : null,
    nota: 'Variación neta de 1151002 en el período. Alta precisión con Ítem 60 cuando el saldo inicial era cero.'
  });

  // ── 5. RETENCIONES IVA DEL PERÍODO ───────────────────────────────────────
  // Cta. 1151007 es ACTIVO.
  // El DEBE (Débitos) registra las retenciones que el ente recibió de sus clientes agentes de retención.
  // Debe coincidir con el Ítem 66 del SENIAT.
  const ret1151 = getAccount('1151007');
  const balRetDebe = Math.abs(ret1151.debitos);
  const senRet = seniat ? seniat.retenciones_periodo : null;
  rows.push({
    id: 'retenciones_periodo',
    concepto: 'Retenciones IVA del Período (Debe)',
    codigosBalance: '1151007',
    campoBalance: 'Debe (Débitos del período)',
    valorBalance: balRetDebe,
    campoSeniat: 'Ítem 66 — Retenciones del Período',
    valorSeniat: senRet,
    diferencia: senRet !== null ? balRetDebe - senRet : null,
    nota: 'Activo: el DEBE registra las retenciones cobradas al ente por clientes agentes de retención.'
  });

  // ── 6. BASE IMPONIBLE VENTAS GRAVADAS ────────────────────────────────────
  // Ctas. 4131xxx son INGRESOS (naturaleza acreedora).
  // El HABER (Créditos) del período = ventas del mes.
  // Debe coincidir con la base gravada declarada en Ítem 42.
  const ingCodes = ['4131001','4131002','4131003'];
  const balVentasHaber = ingCodes.reduce((acc, c) => acc + Math.abs(getAccount(c).creditos), 0);
  const senVentasGrav = seniat ? seniat.ventas_internas_gravadas_base : null;
  rows.push({
    id: 'base_ventas_grav',
    concepto: 'Base Imponible — Ventas Gravadas (Haber)',
    codigosBalance: '4131001 + 4131002 + 4131003',
    campoBalance: 'Haber (Créditos del período)',
    valorBalance: balVentasHaber,
    campoSeniat: 'Ítem 42 — Ventas Gravadas Base Imponible',
    valorSeniat: senVentasGrav,
    diferencia: senVentasGrav !== null ? balVentasHaber - senVentasGrav : null,
    nota: 'Ingresos: el HABER registra ventas/ingresos del mes. La diferencia indica ventas en otras cuentas o no gravadas declaradas.'
  });

  // ── 7. BASE IMPONIBLE COMPRAS GRAVADAS ───────────────────────────────────
  // Ctas. de gastos y costos son EGRESOS (naturaleza deudora).
  // El DEBE (Débitos) = compras/gastos del período que generan crédito fiscal.
  // Debe coincidir con la base de compras gravadas Ítem 33.
  const comprasCodes = [
    '6211002','6211003','6211005','6211007','6211010','6211014',
    '6211029','6211032','6211033','6211034','6211035','6211038','6211040',
    '6111001','6111004',
    '5111003','5111004','5111006','5111007','5111008','5111009','5111011','5111012',
    '1133001'
  ];
  const balComprasDebe = comprasCodes.reduce((acc, c) => acc + Math.abs(getAccount(c).debitos), 0);
  const senComprasGrav = seniat ? seniat.compras_internas_gravadas_base : null;
  rows.push({
    id: 'compras_grav',
    concepto: 'Base Imponible — Compras Gravadas (Debe)',
    codigosBalance: 'Gastos operativos (5111xxx, 6111xxx, 6211xxx, 1133001)',
    campoBalance: 'Debe (Débitos del período)',
    valorBalance: balComprasDebe,
    campoSeniat: 'Ítem 33 — Compras Internas Gravadas Base',
    valorSeniat: senComprasGrav,
    diferencia: senComprasGrav !== null ? balComprasDebe - senComprasGrav : null,
    nota: 'Egresos: el DEBE registra compras y gastos del mes. Solo se incluyen gastos con IVA (no sueldos, prestaciones, etc.).'
  });

  // ── 8. CRUCE INTERNO: Retenciones IVA Activo vs Pasivo ───────────────────
  // 1151007 (activo) = retenciones que el ente tiene a favor
  // 2121002 (pasivo) = retenciones que el ente retiene de proveedores para enterar
  const balRetActSaldo  = Math.abs(getAccount('1151007').saldo_actual);
  const balRetPasSaldo  = Math.abs(getAccount('2121002').saldo_actual);
  rows.push({
    id: 'cruce_retenciones',
    concepto: 'Cruce Retenciones IVA — Activo (1151007) vs Pasivo (2121002)',
    codigosBalance: '1151007 vs 2121002',
    campoBalance: 'Saldo Actual de ambas cuentas',
    valorBalance: balRetActSaldo,
    campoSeniat: 'Saldo 2121002 (Ret. IVA por enterar)',
    valorSeniat: balRetPasSaldo,
    diferencia: balRetActSaldo - balRetPasSaldo,
    nota: 'Cuadre interno. 1151007 = IVA retenido a favor del ente; 2121002 = IVA retenido a proveedores pendiente de enterar.',
    noPdf: true
  });

  // Summary
  const hasSeniat = !!seniat;
  const rowsWithDiff = rows.filter(r => !r.noPdf && r.diferencia !== null && Math.abs(r.diferencia) > 0.05);
  const totalDiff = rows
    .filter(r => !r.noPdf && r.diferencia !== null)
    .reduce((acc, r) => acc + Math.abs(r.diferencia), 0);

  return {
    monthNum,
    monthName: MONTHS_ES[monthNum - 1],
    rows,
    hasSeniat,
    seniat,
    accounts,
    hasDiscrepancies: rowsWithDiff.length > 0,
    discrepancyCount: rowsWithDiff.length,
    totalAbsDiff: totalDiff
  };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderResults() {
  const tabsEl = document.getElementById('monthTabs');
  const panelsEl = document.getElementById('monthPanels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  const months = Object.keys(allResults).map(Number).sort((a,b) => a-b);
  let firstActive = months[0];

  months.forEach(m => {
    const r = allResults[m];

    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.month = m;

    let dotClass = 'no-data';
    if (r.hasSeniat) {
      dotClass = r.hasDiscrepancies ? 'has-diff' : 'no-diff';
    }
    tab.classList.add(dotClass);

    tab.innerHTML = `${MONTHS_ES[m-1].substring(0,3)} <span class="dot"></span>`;
    tab.onclick = () => activateMonth(m);
    tabsEl.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'month-panel';
    panel.id = `panel-${m}`;
    panel.innerHTML = buildMonthPanel(r);
    panelsEl.appendChild(panel);
  });

  activateMonth(firstActive);
}

function activateMonth(m) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.month-panel').forEach(p => p.classList.remove('active'));
  const tab = document.querySelector(`.tab[data-month="${m}"]`);
  if (tab) tab.classList.add('active');
  const panel = document.getElementById(`panel-${m}`);
  if (panel) panel.classList.add('active');
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function diffClass(d) {
  if (d === null) return '';
  if (Math.abs(d) < 0.05) return 'ok';
  if (Math.abs(d) < 50) return 'warn';
  return 'err';
}

function diffLabel(d) {
  if (d === null) return '—';
  const sign = d > 0 ? '+' : '';
  return sign + fmt(d);
}

function buildMonthPanel(r) {
  const { monthName, rows, hasSeniat, seniat, hasDiscrepancies, discrepancyCount, totalAbsDiff } = r;

  // Summary cards
  const okRows = rows.filter(rr => !rr.noPdf && rr.diferencia !== null && Math.abs(rr.diferencia) < 0.05).length;
  const warnRows = rows.filter(rr => !rr.noPdf && rr.diferencia !== null && Math.abs(rr.diferencia) >= 0.05 && Math.abs(rr.diferencia) < 50).length;
  const errRows = rows.filter(rr => !rr.noPdf && rr.diferencia !== null && Math.abs(rr.diferencia) >= 50).length;

  let cardsHtml = `
  <div class="summary-cards">
    <div class="card">
      <div class="card-label">Estado General</div>
      <div class="card-value ${hasSeniat ? (hasDiscrepancies ? 'err' : 'ok') : 'warn'}">
        ${!hasSeniat ? 'Sin PDF' : (hasDiscrepancies ? 'Con diferencias' : 'Cuadrado ✓')}
      </div>
      <div class="card-sub">${monthName} 2024</div>
    </div>
    <div class="card">
      <div class="card-label">Conceptos OK</div>
      <div class="card-value ok">${hasSeniat ? okRows : '—'}</div>
      <div class="card-sub">Sin diferencia</div>
    </div>
    <div class="card">
      <div class="card-label">Con Diferencia</div>
      <div class="card-value ${errRows > 0 ? 'err' : (warnRows > 0 ? 'warn' : 'ok')}">${hasSeniat ? (errRows + warnRows) : '—'}</div>
      <div class="card-sub">${errRows} significativa(s)</div>
    </div>
    <div class="card">
      <div class="card-label">Diferencia Total Abs.</div>
      <div class="card-value ${totalAbsDiff > 100 ? 'err' : (totalAbsDiff > 0.1 ? 'warn' : 'ok')}">${hasSeniat ? fmt(totalAbsDiff) : '—'}</div>
      <div class="card-sub">Suma diferencias absolutas</div>
    </div>
  </div>`;

  // SENIAT summary block
  let seniatHtml = '';
  if (hasSeniat && seniat) {
    seniatHtml = `
    <div class="seniat-block">
      <h4>📋 Datos Declaración SENIAT — ${monthName} 2024</h4>
      <div class="seniat-grid">
        <div class="seniat-item"><label>Ítem 49 — Total Débitos Fiscales</label><value>${fmt(seniat.total_debitos_fiscales)}</value></div>
        <div class="seniat-item"><label>Ítem 71 — Créditos Deducibles</label><value>${fmt(seniat.total_creditos_fiscales_deducibles)}</value></div>
        <div class="seniat-item"><label>Ítem 60 — Excedente CF</label><value>${fmt(seniat.excedente_credito_siguiente)}</value></div>
        <div class="seniat-item"><label>Ítem 42 — Base Ventas Gravadas</label><value>${fmt(seniat.ventas_internas_gravadas_base)}</value></div>
        <div class="seniat-item"><label>Ítem 40 — Ventas No Gravadas</label><value>${fmt(seniat.ventas_no_gravadas)}</value></div>
        <div class="seniat-item"><label>Ítem 33 — Base Compras Gravadas</label><value>${fmt(seniat.compras_internas_gravadas_base)}</value></div>
        <div class="seniat-item"><label>Ítem 66 — Retenciones Período</label><value>${fmt(seniat.retenciones_periodo)}</value></div>
        <div class="seniat-item"><label>Cuota Tributaria</label><value>${fmt(seniat.cuota_tributaria)}</value></div>
        <div class="seniat-item"><label>Total a Pagar</label><value>${fmt(seniat.total_pagar)}</value></div>
      </div>
    </div>`;
  } else {
    seniatHtml = `<div class="no-pdf-notice">⚠ No se cargó declaración SENIAT para ${monthName}. Los campos SENIAT aparecerán vacíos.</div>`;
  }

  // Reconciliation table
  const tableRows = rows.map(row => {
    const dc = row.noPdf ? diffClass(row.diferencia) : (row.diferencia === null ? '' : diffClass(row.diferencia));
    const isInternal = row.noPdf;
    return `
    <tr>
      <td>
        <span class="concept-code">${row.codigosBalance}</span>
        <span class="concept-name">${row.concepto}</span>
      </td>
      <td class="right">${fmt(row.valorBalance)}</td>
      <td>${row.campoSeniat}</td>
      <td class="right">${isInternal ? fmt(row.valorSeniat) : (row.valorSeniat !== null ? fmt(row.valorSeniat) : '—')}</td>
      <td class="right"><span class="diff-cell ${dc}">${diffLabel(row.diferencia)}</span></td>
      <td style="font-size:11px;color:var(--text2);max-width:200px">${row.nota}</td>
    </tr>`;
  }).join('');

  const hasDiffBadge = hasSeniat
    ? (hasDiscrepancies
        ? `<span class="badge err">${discrepancyCount} diferencia(s)</span>`
        : `<span class="badge ok">Cuadrado</span>`)
    : `<span class="badge warn">Sin declaración PDF</span>`;

  const tableHtml = `
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Conciliación — ${monthName} 2024</div>
      ${hasDiffBadge}
      <button class="btn-export" onclick="exportMonth(${r.monthNum})">⬇ Exportar CSV</button>
    </div>
    <div class="scroll-table">
    <table>
      <thead>
        <tr>
          <th>Concepto / Cuentas Balance</th>
          <th class="right">Valor Balance (Bs.)</th>
          <th>Campo SENIAT</th>
          <th class="right">Valor SENIAT (Bs.)</th>
          <th class="right">Diferencia</th>
          <th>Notas</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
    </div>
  </div>`;

  return cardsHtml + seniatHtml + tableHtml;
}

// ─── Export CSV ───────────────────────────────────────────────────────────────
function exportMonth(m) {
  const r = allResults[m];
  if (!r) return;

  const lines = ['Concepto,Cuentas Balance,Campo Balance,Valor Balance,Campo SENIAT,Valor SENIAT,Diferencia,Notas'];
  r.rows.forEach(row => {
    lines.push([
      `"${row.concepto}"`,
      `"${row.codigosBalance}"`,
      `"${row.campoBalance}"`,
      row.valorBalance.toFixed(2),
      `"${row.campoSeniat}"`,
      row.valorSeniat !== null ? row.valorSeniat.toFixed(2) : '',
      row.diferencia !== null ? row.diferencia.toFixed(2) : '',
      `"${row.nota}"`
    ].join(','));
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `conciliacion_iva_${r.monthName}_2024.csv`;
  a.click();
}
</script>
